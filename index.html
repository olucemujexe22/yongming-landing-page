<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永铭电子 - 军工电容国产化替代解决方案</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            text-align: center;
            max-width: 800px;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 12px;
            overflow: hidden;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }
        h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .schemes {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .scheme-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 40px 36px;
            width: 300px;
            transition: all 0.4s ease;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }
        .scheme-card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 20px 60px rgba(212,175,55,0.15);
            background: rgba(255,255,255,0.12);
        }
        .scheme-card .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .scheme-card .name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .scheme-card .desc {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .scheme-card .badge {
            display: inline-block;
            margin-top: 16px;
            padding: 4px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .scheme-card .badge.blue { background: rgba(26,82,118,0.3); color: #6ab0e6; border: 1px solid rgba(106,176,230,0.3); }
        .scheme-card .badge.light { background: rgba(100,180,220,0.2); color: #8ecae6; border: 1px solid rgba(142,202,230,0.3); }
        .footer-text {
            margin-top: 40px;
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }
        @media (max-width: 700px) {
            .schemes { flex-direction: column; align-items: center; }
            .scheme-card { width: 100%; max-width: 320px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="logo.png" alt="永铭电子"></div>
        <h1>永铭电子</h1>
        <div class="subtitle">军工电容国产化替代解决方案 · 方案预览</div>
        <div class="schemes">
            <a class="scheme-card" href="深蓝色方案/index.html" target="_blank">
                <div class="icon">🌊</div>
                <div class="name">深蓝色方案</div>
                <div class="desc">沉稳大气 · 深蓝背景<br>适合正式商务展示</div>
                <div class="badge blue">查看预览 →</div>
            </a>
            <a class="scheme-card" href="浅蓝色方案/index.html" target="_blank">
                <div class="icon">☀️</div>
                <div class="name">浅蓝色方案</div>
                <div class="desc">清新明亮 · 浅蓝背景<br>适合轻快视觉风格</div>
                <div class="badge light">查看预览 →</div>
            </a>
        </div>
        <div class="footer-text">点击上方卡片查看对应方案效果</div>
    </div>
</body>
</html>
